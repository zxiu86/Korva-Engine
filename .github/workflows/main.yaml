name: Korva Engine Build CI with Cache

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع 📥
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد الجافا (مهم جداً لـ Gradle و SDK 35) ☕
      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. إعداد الـ Flutter 🚀
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true # كاش مدمج بداخل الـ Action لملفات الـ SDK الأساسية

      # 4. إعداد كاش مخصص ومضمون لمكتبات Pub (الـ Packages) 📦🔒
      - name: Cache Flutter Pub Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/pub
          # المفتاح يعتمد على نظام التشغيل وملف pubspec.lock (إذا تغير الملف يتحدث الكاش)
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # 5. محاكاة خطوات الـ One-Time Setup الخاصة بـ Korva Engine 🛠️
      - name: Harvest Gradle Wrapper & Setup
        run: |
          echo "🤖 توليد مشروع مؤقت لسرقة الـ Gradle Wrapper..."
          flutter create --platforms=android /tmp/scratch
          
          echo "📦 نسخ ملفات الـ Wrapper لمشروعنا..."
          cp -r /tmp/scratch/android/gradle android/gradle
          cp /tmp/scratch/android/gradlew android/gradlew
          cp /tmp/scratch/android/gradlew.bat android/gradlew.bat
          chmod +x android/gradlew

      # 6. تحميل مكاتب دارت وفلتر (راح يسحبهم من الكاش إذا متوفرين!) 📥
      - name: Install Dependencies
        run: flutter pub get

      # 7. تشغيل الفحص والتحليل للكود 🔍
      - name: Analyze Project Code
        run: flutter analyze

      # 8. بناء نسخة الـ APK (Release) 📱
      - name: Build Android APK
        run: flutter build apk --release

      # 9. رفع الـ APK الناتج كملف جاهز للتحميل 🎉
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: korva-engine-apk
          path: build/app/outputs/flutter-apk/app-release.apk
